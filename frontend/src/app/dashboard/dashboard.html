<mat-toolbar color="primary">
  <span>Mi App</span>
  <span style="flex:1"></span>
  <span style="margin-right:1rem">Hola, {{ name }}</span>
  <button mat-raised-button (click)="logout()">Cerrar sesión</button>
</mat-toolbar>

<div style="padding:2rem">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Dashboard</mat-card-title>
      <mat-card-subtitle>Bienvenido, {{ name }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content style="margin-top:1rem">
      <p>Estás autenticado correctamente con JWT.</p>
    </mat-card-content>
  </mat-card>
</div>
